spring.application.name=read-option

# ===== Database =====
spring.datasource.url=jdbc:postgresql://localhost:5433/readoption
spring.datasource.username=readoption
spring.datasource.password=readoption
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
# Turn off the brute-force SQL dumping
spring.jpa.show-sql=false

# Route Hibernate SQL through SLF4J at DEBUG level (off by default, enable when needed)
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===== Spring AI (Anthropic) =====
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5
spring.ai.anthropic.chat.options.max-tokens=2000
spring.ai.anthropic.chat.options.temperature=0.3

# ===== Server =====
server.port=8080

# ===== Sleeper API =====
sleeper.api.players-url=https://api.sleeper.app/v1/players/nfl
sleeper.api.stats-url=https://api.sleeper.app/stats/nfl
sleeper.api.projections-url=https://api.sleeper.app/projections/nfl

# ===== Read Option =====
readoption.current-season=2026
readoption.espn.player-limit=400

# ===== League customization (Phase 3) =====
readoption.customization.model=claude-sonnet-4-6
readoption.customization.max-refine-turns=5
# Parser system prompt lives in src/main/resources/prompts/league-parser.txt
# (a multi-line properties value truncates silently on a stray trailing space).

# ===== Draft agent (Phase 4.2) =====
readoption.agent.model=claude-sonnet-4-6
readoption.agent.max-iterations=8
readoption.agent.memory-window=20
# Agent system prompt lives in src/main/resources/prompts/draft-agent-system.txt
# Per-iteration loop instrumentation logs at DEBUG:
logging.level.app.readoption.agent=DEBUG

# ===== Reconciliation =====
# cvThreshold + pointsFloor are PROVISIONAL — calibrate via the dry-run distribution
# (POST /api/projections/reconcile/{season}?dryRun=true) before running for real.
# measuringStick is a disagreement DETECTOR (PPR dominates Standard); lock via dual dry-run.
readoption.reconcile.cv-threshold=0.10
readoption.reconcile.points-floor=20.0
readoption.reconcile.measuring-stick=PPR
readoption.reconcile.model=claude-sonnet-4-6
# Classifier system prompt - tune here without recompiling (restart to apply).
readoption.reconcile.system-prompt=You classify disagreement between fantasy-football \
  projection sources. You do NOT produce numbers - you return a verdict enum, a confidence \
  enum, and a short rationale. \
  Reason about the shape of the disagreement: touchdown-driven gaps are high-variance and \
  regress toward the mean; volume- and role-driven gaps are more structural. You are also \
  given the player's actual production from recent seasons. Use it as a baseline: judge which \
  projection is more consistent with the player's established role and production. A projection \
  far above a player's established usage is a stronger, riskier claim than one near it. \
  Make a directional call (FAVOR_HIGH_SOURCE or FAVOR_LOW_SOURCE) when the disagreement shape \
  and the player's history together point to one source being more grounded - for example, when \
  the higher projection implies a role the player has never held, or when the gap is mostly \
  touchdowns that prior production suggests will regress. Use TRUST_CONSENSUS when both \
  projections are plausible against the player's history and the gap is minor. \
  Reserve FLAG_UNCERTAIN for genuinely unadjudicable cases: a player with little or no prior NFL \
  production (rookies, or a player in a new and unestablished role), or a disagreement so broad \
  across volume, role, and touchdowns at once that prior production cannot settle it. Flagging a \
  disagreement that the player's history can actually resolve is an error; so is forcing a \
  confident call on a player whose history cannot settle it. \
  You have no news, injury, or depth-chart information beyond the production history given - \
  reason only from the projections and the actuals provided.